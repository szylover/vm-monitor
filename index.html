<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VM Monitor | lovebxy.net</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      text-align: center;
      padding: 3rem 1rem 1rem;
    }
    header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 0.4rem; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1rem 0;
    }
    .toolbar button {
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .toolbar button:hover { background: rgba(56,189,248,0.15); }
    .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .toolbar .last-check { color: var(--muted); font-size: 0.85rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
      max-width: 800px;
      width: 100%;
      padding: 1rem 1.5rem 3rem;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.8rem;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .card.ok { border-color: var(--green); }
    .card.down { border-color: var(--red); }
    .card.unknown { border-color: var(--yellow); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .card-header h2 { font-size: 1.3rem; }

    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.down { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .status-dot.unknown { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    .metric {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 0.8rem;
    }
    .metric .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .metric .value { font-size: 1.1rem; font-weight: 600; margin-top: 0.2rem; }
    .metric .value.ok { color: var(--green); }
    .metric .value.down { color: var(--red); }
    .metric .value.unknown { color: var(--yellow); }

    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
    .loading .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239,68,68,0.15);
      color: var(--red);
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      max-width: 600px;
      margin: 1rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📡 VM 监控面板</h1>
    <p>Azure 虚拟机 & V2Ray 服务状态</p>
  </header>

  <div class="toolbar">
    <button id="refreshBtn" onclick="fetchStatus()">🔄 刷新</button>
    <span class="last-check" id="lastCheck">加载中...</span>
  </div>

  <div id="content">
    <div class="loading"><span class="spinner"></span>正在检测...</div>
  </div>

  <footer>
    <p>每 60 秒自动刷新 · <a href="https://www.lovebxy.net">返回主页</a></p>
  </footer>

  <script>
    const STATUS_LABELS = { running: "运行中", deallocated: "已停止", stopped: "已停止", unknown: "未知", error: "查询失败" };
    const V2RAY_LABELS = { ok: "正常", down: "不可达" };

    function statusClass(vmStatus, v2rayStatus) {
      if (vmStatus !== "running") return "down";
      return v2rayStatus === "ok" ? "ok" : "down";
    }

    function renderCards(data) {
      const container = document.getElementById("content");
      if (!data || !data.vms) {
        container.innerHTML = '<div class="error-msg">⚠️ 无法获取状态数据</div>';
        return;
      }
      container.innerHTML = '<div class="grid">' + data.vms.map(vm => {
        const cls = statusClass(vm.vmStatus, vm.v2rayStatus);
        return `
          <div class="card ${cls}">
            <div class="card-header">
              <h2>${vm.name === "vm-hk" ? "🇭🇰" : "🇺🇸"} ${vm.name}</h2>
              <span class="status-dot ${cls}"></span>
            </div>
            <div class="metrics">
              <div class="metric">
                <div class="label">VM 状态</div>
                <div class="value ${vm.vmStatus === 'running' ? 'ok' : 'down'}">${STATUS_LABELS[vm.vmStatus] || vm.vmStatus}</div>
              </div>
              <div class="metric">
                <div class="label">V2Ray</div>
                <div class="value ${vm.v2rayStatus === 'ok' ? 'ok' : 'down'}">${V2RAY_LABELS[vm.v2rayStatus] || vm.v2rayStatus}</div>
              </div>
              <div class="metric">
                <div class="label">延迟</div>
                <div class="value">${vm.responseTime >= 0 ? vm.responseTime + ' ms' : '—'}</div>
              </div>
              <div class="metric">
                <div class="label">地区 · 端口</div>
                <div class="value" style="font-size:0.85rem">${vm.location} :${vm.v2rayPort}</div>
              </div>
            </div>
          </div>`;
      }).join("") + '</div>';
      document.getElementById("lastCheck").textContent = "上次检测: " + new Date(data.timestamp).toLocaleTimeString("zh-CN");
    }

    async function fetchStatus() {
      const btn = document.getElementById("refreshBtn");
      btn.disabled = true;
      btn.textContent = "⏳ 检测中...";
      try {
        const res = await fetch("/api/status");
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        renderCards(data);
      } catch (e) {
        document.getElementById("content").innerHTML = `<div class="error-msg">⚠️ 请求失败: ${e.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = "🔄 刷新";
      }
    }

    fetchStatus();
    setInterval(fetchStatus, 60000);
  </script>
</body>
</html>
